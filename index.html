<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RBNY Academy — Daily Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f0f0;--red:#cc0000;--text:#1a1a1a;--text2:#555;--text3:#888;--border:#ddd;--font:'Barlow Condensed',sans-serif;--fontb:'Barlow',sans-serif;--tbh:52px}
body{background:var(--bg);color:var(--text);font-family:var(--fontb);font-size:13px;min-height:100vh}
.topbar{background:var(--red);display:flex;align-items:center;gap:10px;padding:0 14px;height:var(--tbh);position:sticky;top:0;z-index:300}
.logo-box{background:#fff;border-radius:50%;width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.logo-box img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.rpt-title{font-family:var(--font);font-size:17px;font-weight:800;letter-spacing:1px;color:#fff;white-space:nowrap;flex-shrink:0}
.tb-pills{display:flex;gap:5px;align-items:center;flex:1;justify-content:flex-end}
.pill{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.28);color:#fff;font-family:var(--font);font-size:11px;font-weight:700;padding:4px 10px;border-radius:3px;display:flex;align-items:center;gap:3px;white-space:nowrap;cursor:pointer}
.main{padding:8px}
.pg{display:grid;gap:7px}.sg{margin-bottom:7px}
.g2{grid-template-columns:1fr 1fr}
@media(max-width:480px){.g2{grid-template-columns:1fr}}
.panel{background:#fff;border:1px solid var(--border);padding:10px 10px 6px}
.pt{font-family:var(--font);font-size:12px;font-weight:800;text-transform:uppercase;color:var(--red);text-align:center;margin-bottom:5px;letter-spacing:.3px}
.cb{position:relative;height:180px}
.ctrl-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
select.ctrl{background:#fff;border:1px solid var(--border);color:var(--text);padding:4px 9px;border-radius:3px;font-size:12px;font-family:var(--fontb);outline:none;cursor:pointer}
select.ctrl:focus{border-color:var(--red)}
.cl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-box"><div style="width:32px;height:32px;border-radius:50%;background:#cc0000"></div></div>
  <div class="rpt-title">RBNY Academy</div>
  <div class="tb-pills"><div class="pill" onclick="loadAllData()">↻ <span id="last-updated" style="font-size:10px;opacity:.8">Loading…</span></div></div>
</div>

<div class="main">
  <div class="ctrl-row">
    <span class="cl">Player:</span><select class="ctrl" id="pd-player"></select>
    <span class="cl">Sessions:</span>
    <select class="ctrl" id="pd-n"><option value="7">Last 7 days</option><option value="10">Last 10</option><option value="20">Last 20</option><option value="30">Last 30</option></select>
  </div>
  <div class="pg g2 sg"><div class="panel"><div class="pt">Total Distance (m)</div><div class="cb"><canvas id="c-pd-dist"></canvas></div></div><div class="panel"><div class="pt">Distance Per Minute</div><div class="cb"><canvas id="c-pd-dpm"></canvas></div></div></div>
  <div class="pg g2 sg"><div class="panel"><div class="pt">High Speed Running (m)</div><div class="cb"><canvas id="c-pd-hsr"></canvas></div></div><div class="panel"><div class="pt">Very High Speed Running (m)</div><div class="cb"><canvas id="c-pd-vhsr"></canvas></div></div></div>
  <div class="pg g2 sg"><div class="panel"><div class="pt">Sprint Distance (m)</div><div class="cb"><canvas id="c-pd-sprint"></canvas></div></div><div class="panel"><div class="pt">Explosive Distance (m)</div><div class="cb"><canvas id="c-pd-expl"></canvas></div></div></div>
  <div class="pg g2 sg"><div class="panel"><div class="pt">Max Speed (m/s)</div><div class="cb"><canvas id="c-pd-maxspd"></canvas></div></div><div class="panel"><div class="pt">Accelerations (high)</div><div class="cb"><canvas id="c-pd-acc"></canvas></div></div></div>
  <div class="pg g2 sg"><div class="panel"><div class="pt">Decelerations (high)</div><div class="cb"><canvas id="c-pd-dec"></canvas></div></div></div>
</div>

<div id="loader-overlay" style="position:fixed;inset:0;background:rgba(10,10,10,.85);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:#cc0000;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:1px">LOADING DATA…</div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</div>

<script>
(function(){
  const PW='rbnyathletes2026';
  const KEY='rbny_athlete_auth';
  if(sessionStorage.getItem(KEY)!==PW){
    const entered=prompt('RBNY Academy — Enter Password:');
    if(entered!==PW){
      document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a;font-family:sans-serif;color:#fff;font-size:16px">Access Denied</div>';
      return;
    }
    sessionStorage.setItem(KEY,PW);
  }
})();

let PLAYERS=[],GPS={},PM={};
const CH={};
const MC={dist:{c:'#cc0000',bg:'rgba(204,0,0,0.45)'},dpm:{c:'#990000',bg:'rgba(153,0,0,0.45)'},hsr:{c:'#444444',bg:'rgba(68,68,68,0.45)'},vhsr:{c:'#880000',bg:'rgba(136,0,0,0.45)'},sprint:{c:'#1a1a1a',bg:'rgba(26,26,26,0.45)'},expl:{c:'#bb0000',bg:'rgba(187,0,0,0.45)'},maxspd:{c:'#666666',bg:'rgba(102,102,102,0.45)'},acc:{c:'#770000',bg:'rgba(119,0,0,0.45)'},dec:{c:'#333333',bg:'rgba(51,51,51,0.45)'}};
const METRICS=['dist','dpm','hsr','vhsr','sprint','expl','maxspd','acc','dec'];

function showLoader(){document.getElementById('loader-overlay').style.display='flex';}
function hideLoader(){document.getElementById('loader-overlay').style.display='none';}

function bOpt(){return{responsive:true,maintainAspectRatio:false,layout:{padding:{top:16}},plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:45},grid:{display:false}},y:{ticks:{font:{size:9}},grid:{color:'#f0f0f0'}}}};}
function mkBar(id,labels,data,color,bg){const c=document.getElementById(id);if(!c)return;if(CH[id])CH[id].destroy();const opts=bOpt();opts.plugins.datalabels={anchor:'end',align:'top',color:'#333',font:{size:8,weight:'700'},clip:false,formatter:v=>v==null?'':typeof v==='number'?+(v%1===0?v.toFixed(0):v.toFixed(1)):v};CH[id]=new Chart(c,{type:'bar',data:{labels,datasets:[{data,backgroundColor:bg||color+'44',borderColor:color,borderWidth:1,borderRadius:2}]},options:opts,plugins:[ChartDataLabels]});}

function parseDate(s){
  if(!s&&s!==0)return new Date(0);
  if(typeof s==='number')return new Date((s-25569)*86400000);
  if(s.includes('-'))return new Date(s);
  const[m,d,y]=s.split('/');
  if(!y)return new Date(0);
  return new Date(+y<100?2000+ +y:+y,+m-1,+d);
}

function populateDropdown(id){
  const sel=document.getElementById(id);if(!sel||sel.options.length)return;
  [...PLAYERS].sort((a,b)=>a.localeCompare(b))
    .forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=`${p} (${PM[p]||'?'})`;sel.appendChild(o);});
}

function initPlayerday(){
  populateDropdown('pd-player');
  document.getElementById('pd-player').onchange=renderPlayerDay;
  document.getElementById('pd-n').onchange=renderPlayerDay;
  renderPlayerDay();
}

function renderPlayerDay(){
  const player=document.getElementById('pd-player').value;
  const nVal=document.getElementById('pd-n').value;
  let sessions=(GPS[player]||[]).filter(s=>s.dist);
  if(nVal==='7'){const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);sessions=sessions.filter(s=>new Date(s.date)>=cutoff);}
  else sessions=sessions.slice(-+nVal);
  const labels=sessions.map(s=>{const p=parseDate(s.date);return`${p.getMonth()+1}/${p.getDate()}`;});
  METRICS.forEach(k=>{mkBar('c-pd-'+k,labels,sessions.map(s=>s[k]??null),MC[k]?.c||'#cc0000',MC[k]?.bg);});
}

async function loadAllData(){
  showLoader();
  try{
    const d=await fetch('/api/gps').then(r=>r.json());
    if(d.error) throw new Error(d.error);
    PLAYERS=(d.players||[]).sort((a,b)=>a.localeCompare(b));
    GPS=d.gps||{};
    PM=d.pos_map||{};
    document.getElementById('last-updated').textContent='Updated: '+new Date().toLocaleTimeString();
  }catch(err){
    document.getElementById('loader-overlay').innerHTML=`<div style="text-align:center;color:#fff"><div style="font-size:18px;font-weight:700;margin-bottom:8px">⚠ Could not load data</div><div style="font-size:13px;opacity:.7">${err.message}</div><button onclick="loadAllData()" style="margin-top:14px;padding:8px 20px;background:#cc0000;color:#fff;border:none;border-radius:3px;cursor:pointer;font-weight:700">Retry</button></div>`;
    return;
  }
  hideLoader();
  initPlayerday();
}

loadAllData();
</script>

</body>
</html>
